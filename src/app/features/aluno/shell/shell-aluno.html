<div class="app-shell">
  <div class="sidebar-overlay" [class.aberta]="sidebarAberta()" (click)="fechar()"></div>

  <aside class="app-sidebar" [class.aberta]="sidebarAberta()">
    <div class="sidebar-logo">
      <img src="logo-ouri-play.png" alt="OuriPlay" class="sidebar-logo-img" />
    </div>
    <nav>
      <a routerLink="/aluno/dashboard" routerLinkActive="active" (click)="fechar()">
        <mat-icon>dashboard</mat-icon> Dashboard
      </a>
      <a routerLink="/aluno/aulas" routerLinkActive="active" (click)="fechar()">
        <mat-icon>sports</mat-icon> Aulas Disponíveis
      </a>
      <a routerLink="/aluno/calendario" routerLinkActive="active" (click)="fechar()">
        <mat-icon>calendar_month</mat-icon> Calendário
      </a>
      <a routerLink="/aluno/historico" routerLinkActive="active" (click)="fechar()">
        <mat-icon>history</mat-icon> Histórico
      </a>
      <a routerLink="/aluno/perfil" routerLinkActive="active" (click)="fechar()">
        <mat-icon>person</mat-icon> Meu Perfil
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-theme-toggle" (click)="theme.toggle()">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        {{ theme.isDark() ? 'Modo claro' : 'Modo escuro' }}
      </button>
    </div>
  </aside>

  <div class="app-main">
    <div class="app-topbar">
      <button class="topbar-menu-btn" (click)="alternar()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="topbar-date">{{ hoje }}</span>
      <button class="user-info" [matMenuTriggerFor]="userMenu" style="background:none;border:none;cursor:pointer">
        <mat-icon>account_circle</mat-icon>
        <span>{{ nome }}</span>
        <mat-icon style="font-size:18px;margin-left:2px">arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="auth.confirmarLogout()">
          <mat-icon>logout</mat-icon> Sair
        </button>
      </mat-menu>
    </div>
    <div class="app-content">
      <router-outlet />
    </div>
  </div>
</div>
