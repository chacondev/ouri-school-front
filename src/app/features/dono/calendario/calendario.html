<div class="page-card">
  <div class="card-header">
    <h2>Calendário da Escola</h2>
  </div>

  @if (professoresLegenda().length) {
    <div class="cal-legenda">
      @for (p of professoresLegenda(); track p.nome) {
        <span class="cal-legenda-item">
          <span class="cal-legenda-dot" [style.background]="p.cor"></span>
          {{ p.nome }}
        </span>
      }
    </div>
  }

  <div class="cal-loading-wrapper">
    @if (loading()) {
      <div class="cal-loading-overlay">
        <mat-spinner diameter="48" />
      </div>
    }
    <full-calendar [options]="calendarOptions" [class.cal-invisible]="loading()" />
  </div>
</div>
