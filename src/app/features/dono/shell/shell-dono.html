<div class="app-shell">
  <aside class="app-sidebar">
    <div class="sidebar-logo">
      <h2>OURI</h2>
      <small>Sistemas de Gestão</small>
    </div>
    <nav>
      <a routerLink="/dono/home" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon> Início
      </a>
      <a routerLink="/dono/professores" routerLinkActive="active">
        <mat-icon>school</mat-icon> Professores
      </a>
      <a routerLink="/dono/alunos" routerLinkActive="active">
        <mat-icon>people</mat-icon> Alunos
      </a>
      <a routerLink="/dono/modalidades" routerLinkActive="active">
        <mat-icon>sports</mat-icon> Modalidades
      </a>
      <a routerLink="/dono/quadras" routerLinkActive="active">
        <mat-icon>stadium</mat-icon> Quadras
      </a>
      <a routerLink="/dono/aulas" routerLinkActive="active">
        <mat-icon>calendar_month</mat-icon> Aulas
      </a>
    </nav>
  </aside>

  <div class="app-main">
    <div class="app-topbar">
      <h1>OURI · Gestão</h1>
      <span class="topbar-date">{{ hoje }}</span>
      <button class="user-info" [matMenuTriggerFor]="userMenu" style="background:none;border:none;cursor:pointer">
        <mat-icon>account_circle</mat-icon>
        <span>{{ nome }}</span>
        <mat-icon style="font-size:18px;margin-left:2px">arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="auth.confirmarLogout()">
          <mat-icon>logout</mat-icon> Sair
        </button>
      </mat-menu>
    </div>
    <div class="app-content">
      <router-outlet />
    </div>
  </div>
</div>
