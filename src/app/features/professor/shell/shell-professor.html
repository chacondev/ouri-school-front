<div class="app-shell">
  <div class="sidebar-overlay" [class.aberta]="sidebarAberta()" (click)="fechar()"></div>

  <aside class="app-sidebar" [class.aberta]="sidebarAberta()">
    <div class="sidebar-logo">
      <h2>OURI</h2>
      <small>Sistemas de Gestão</small>
    </div>
    <nav>
      <a routerLink="/professor/dashboard" routerLinkActive="active" (click)="fechar()">
        <mat-icon>dashboard</mat-icon> Dashboard
      </a>
      <a routerLink="/professor/agenda" routerLinkActive="active" (click)="fechar()">
        <mat-icon>event</mat-icon> Minha Agenda
      </a>
      <a routerLink="/professor/criar-aula" routerLinkActive="active" (click)="fechar()">
        <mat-icon>add_circle</mat-icon> Criar Aula
      </a>
      <a routerLink="/professor/historico" routerLinkActive="active" (click)="fechar()">
        <mat-icon>history</mat-icon> Histórico
      </a>
      <a routerLink="/professor/perfil" routerLinkActive="active" (click)="fechar()">
        <mat-icon>person</mat-icon> Meu Perfil
      </a>
    </nav>
  </aside>

  <div class="app-main">
    <div class="app-topbar">
      <button class="topbar-menu-btn" (click)="alternar()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="topbar-date">{{ hoje }}</span>
      <button class="user-info" [matMenuTriggerFor]="userMenu" style="background:none;border:none;cursor:pointer">
        <mat-icon>account_circle</mat-icon>
        <span>{{ nome }}</span>
        <mat-icon style="font-size:18px;margin-left:2px">arrow_drop_down</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu" xPosition="before">
        <button mat-menu-item (click)="auth.confirmarLogout()">
          <mat-icon>logout</mat-icon> Sair
        </button>
      </mat-menu>
    </div>
    <div class="app-content">
      <router-outlet />
    </div>
  </div>
</div>
