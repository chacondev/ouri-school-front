@if (dashboard(); as d) {
  <div class="dashboard-grid">
    <div class="stat-card">
      <span class="stat-label">Alunos Inscritos</span>
      <span class="stat-value">{{ d.totalAlunosInscritos }}</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Aulas Hoje</span>
      <span class="stat-value">{{ d.aulasHoje }}</span>
    </div>
  </div>

  <div class="page-card">
    <div class="card-header">
      <h2>Próximas Aulas</h2>
      <a routerLink="/professor/agenda" style="font-size:0.85rem;color:var(--blue)">Ver agenda</a>
    </div>
    <table mat-table [dataSource]="d.proximasAulas">
      <ng-container matColumnDef="modalidade">
        <th mat-header-cell *matHeaderCellDef>Modalidade</th>
        <td mat-cell *matCellDef="let a">{{ a.modalidade }}</td>
      </ng-container>
      <ng-container matColumnDef="quadra">
        <th mat-header-cell *matHeaderCellDef>Quadra</th>
        <td mat-cell *matCellDef="let a">{{ a.quadra }}</td>
      </ng-container>
      <ng-container matColumnDef="inicio">
        <th mat-header-cell *matHeaderCellDef>Data / Hora</th>
        <td mat-cell *matCellDef="let a">{{ a.inicio | date:'dd/MM/yy HH:mm' }}</td>
      </ng-container>
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let a">
          <span [class]="statusClass(a.status)">{{ a.status }}</span>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
    </table>
  </div>
} @else {
  <div class="text-center mt-24" style="color:#999">Carregando dashboard...</div>
}
