<div class="page-card">
  <div class="card-header">
    <h2>Calendário de Aulas</h2>
  </div>

  <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:6px;font-size:13px">
      <span style="width:12px;height:12px;border-radius:50%;background:#1976d2;display:inline-block"></span> Agendada
    </span>
    <span style="display:flex;align-items:center;gap:6px;font-size:13px">
      <span style="width:12px;height:12px;border-radius:50%;background:#388e3c;display:inline-block"></span> Realizada
    </span>
    <span style="display:flex;align-items:center;gap:6px;font-size:13px">
      <span style="width:12px;height:12px;border-radius:50%;background:#d32f2f;display:inline-block"></span> Cancelada
    </span>
  </div>

  <full-calendar [options]="calendarOptions" />
</div>
