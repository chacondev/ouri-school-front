<div class="page-card">
  <div class="card-header">
    <h2>Calendário de Aulas</h2>
  </div>

  <div class="cal-legenda">
    <span class="cal-legenda-item">
      <span class="cal-legenda-dot" style="background:var(--navy-dark)"></span> Agendada
    </span>
    <span class="cal-legenda-item">
      <span class="cal-legenda-dot" style="background:var(--green)"></span> Realizada
    </span>
    <span class="cal-legenda-item">
      <span class="cal-legenda-dot" style="background:var(--red)"></span> Cancelada
    </span>
  </div>

  <full-calendar [options]="calendarOptions" />
</div>
