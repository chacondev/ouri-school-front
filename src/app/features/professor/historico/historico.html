<div class="page-card">
  <div class="card-header">
    <h2>Histórico de Aulas</h2>
  </div>

  @if (carregando()) { <mat-progress-bar mode="indeterminate" /> }
  <table mat-table [dataSource]="aulas()">
    <ng-container matColumnDef="modalidade">
      <th mat-header-cell *matHeaderCellDef>Modalidade</th>
      <td mat-cell *matCellDef="let a">{{ a.modalidade }}</td>
    </ng-container>
    <ng-container matColumnDef="quadra">
      <th mat-header-cell *matHeaderCellDef>Quadra</th>
      <td mat-cell *matCellDef="let a">{{ a.quadra }}</td>
    </ng-container>
    <ng-container matColumnDef="inicio">
      <th mat-header-cell *matHeaderCellDef>Data</th>
      <td mat-cell *matCellDef="let a">{{ a.inicio | date:'dd/MM/yyyy HH:mm' }}</td>
    </ng-container>
    <ng-container matColumnDef="fim">
      <th mat-header-cell *matHeaderCellDef>Fim</th>
      <td mat-cell *matCellDef="let a">{{ a.fim | date:'HH:mm' }}</td>
    </ng-container>
    <ng-container matColumnDef="totalAlunos">
      <th mat-header-cell *matHeaderCellDef>Alunos</th>
      <td mat-cell *matCellDef="let a">{{ a.totalAlunos }}</td>
    </ng-container>
    <ng-container matColumnDef="statusAula">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let a">
        <span [class]="statusClass(a.statusAula)">{{ a.statusAula }}</span>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="colunas"></tr>
    <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
  </table>

  @if (aulas().length === 0) {
    <p class="text-center mt-16" style="color:#999">Nenhuma aula no histórico.</p>
  }

  <mat-paginator
    [length]="total()"
    [pageSize]="tamanhoPagina()"
    [pageIndex]="pagina()"
    [pageSizeOptions]="[5, 10, 25]"
    (page)="onPage($event)"
    showFirstLastButtons>
  </mat-paginator>
</div>
