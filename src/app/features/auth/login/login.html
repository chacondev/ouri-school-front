<div class="login-page">
  <header class="login-header">
    <h1>OURI</h1>
    <small>Sistemas de Gestão</small>
  </header>

  <div class="login-body">
    <div class="login-card">
      <h2>BEM VINDO 👋</h2>
      <p>Faça login para continuar</p>

      @if (errorMsg()) {
        <div class="error-msg">{{ errorMsg() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <label class="field-label">Email</label>
        <mat-form-field appearance="fill">
          <input matInput formControlName="email" placeholder="emailteste@gmail.com" type="email" autocomplete="email" />
        </mat-form-field>

        <label class="field-label" style="margin-top:12px">Senha</label>
        <mat-form-field appearance="fill">
          <input
            matInput
            formControlName="senha"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••••••"
            autocomplete="current-password"
          />
          <button type="button" mat-icon-button matSuffix (click)="showPassword.set(!showPassword())">
            <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="login-actions">
          <button
            type="submit"
            mat-flat-button
            class="btn-entrar"
            [disabled]="form.invalid || loading()"
          >
            @if (loading()) {
              <mat-spinner diameter="20" />
            } @else {
              ENTRAR
            }
          </button>
          <a class="link-forgot" href="#">Esqueci minha senha</a>
        </div>
      </form>

      <div class="security-note">
        <mat-icon>lock</mat-icon>
        <span>Seus dados estão protegidos</span>
      </div>
    </div>
  </div>

  <footer class="login-footer"></footer>
</div>
