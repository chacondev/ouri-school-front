<div class="login-page">

  <!-- Lado esquerdo: logo e tagline -->
  <div class="login-left">
    <img src="logo-ouri-play.png" alt="OuriPlay" class="login-brand-logo" />
    <p class="login-tagline">
      Gestão esportiva inteligente,<br>
      conectando <span>times</span>, <span>atletas</span> e <span>resultados</span>.
    </p>
  </div>

  <!-- Lado direito: formulário -->
  <div class="login-right">
    <div class="login-form-wrapper">
      <h2>Bem vindo 👋</h2>
      <p class="login-subtitle">Faça login para continuar</p>

      @if (errorMsg()) {
        <div class="error-msg">{{ errorMsg() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <label class="field-label">EMAIL</label>
        <mat-form-field appearance="outline">
          <mat-icon matPrefix class="field-prefix-icon">email</mat-icon>
          <input matInput formControlName="email" placeholder="emailteste@gmail.com" type="email" autocomplete="email" />
        </mat-form-field>

        <label class="field-label">SENHA</label>
        <mat-form-field appearance="outline">
          <mat-icon matPrefix class="field-prefix-icon">lock</mat-icon>
          <input
            matInput
            formControlName="senha"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••••••"
            autocomplete="current-password"
          />
          <button type="button" mat-icon-button matSuffix (click)="showPassword.set(!showPassword())">
            <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <div class="login-options">
          <mat-checkbox class="remember-check">Lembrar minha senha</mat-checkbox>
          <a class="link-forgot" href="#">Esqueci minha senha</a>
        </div>

        <button
          type="submit"
          mat-flat-button
          class="btn-entrar"
          [disabled]="form.invalid || loading()"
        >
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            ENTRAR
          }
        </button>

      </form>

      <div class="security-note">
        <mat-icon>lock</mat-icon>
        <span>Seus dados estão protegidos</span>
      </div>
    </div>
  </div>

</div>
